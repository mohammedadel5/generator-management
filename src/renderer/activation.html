<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تنشيط النظام</title>
    <style>
        :root {
            --primary: #2563eb;
            --bg: #0f172a;
            --panel: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --border: rgba(255,255,255,0.1);
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--panel);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            padding: 2.5rem;
            border-radius: 1rem;
            width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        h1 { margin-bottom: 0.5rem; font-size: 1.5rem; }
        p { color: #94a3b8; font-size: 0.9rem; margin-bottom: 2rem; }
        .input-group { text-align: right; margin-bottom: 1.5rem; }
        label { display: block; margin-bottom: 0.5rem; font-size: 0.85rem; color: #cbd5e1; }
        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border);
            border-radius: 0.5rem;
            color: white;
            font-family: monospace;
            font-size: 1.1rem;
            box-sizing: border-box;
            text-align: center;
        }
        input:focus { outline: 2px solid var(--primary); border-color: transparent; }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }
        .status { margin-top: 1rem; font-size: 0.85rem; min-height: 1.2rem; }
        .error { color: #f87171; }
        .success { color: #4ade80; }
        .hwid { margin-top: 2rem; font-size: 0.7rem; color: #475569; border-top: 1px solid var(--border); padding-top: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
        <h1>تنشيط البرنامج</h1>
        <p>يرجى إدخال رمز التنشيط الخاص بك للمتابعة</p>
        
        <div class="input-group">
            <label for="license-key">رمز التنشيط</label>
            <input type="text" id="license-key" placeholder="XXXX-XXXX-XXXX-XXXX" />
        </div>
        
        <button id="activate-btn">تنشيط الآن</button>
        <div id="status-msg" class="status"></div>
        
        <div class="hwid">
            ID: <span id="machine-id">جاري التحميل...</span>
        </div>
    </div>

    <script>
        const keyInput = document.getElementById('license-key');
        const activateBtn = document.getElementById('activate-btn');
        const statusMsg = document.getElementById('status-msg');
        const machineIdEl = document.getElementById('machine-id');

        // Get HWID on load
        window.api.getMachineId().then(id => {
            machineIdEl.textContent = id;
        });

        activateBtn.addEventListener('click', async () => {
            const key = keyInput.value.trim();
            if (!key) return;

            activateBtn.disabled = true;
            statusMsg.textContent = 'جاري التحقق من الرمز...';
            statusMsg.className = 'status';

            const result = await window.api.activateLicense(key);
            
            if (result.success) {
                statusMsg.textContent = 'تم التنشيط بنجاح! جاري الدخول...';
                statusMsg.className = 'status success';
                setTimeout(() => {
                    window.api.reloadApp();
                }, 2000);
            } else {
                statusMsg.textContent = result.error || 'فشل التنشيط. تأكد من الرمز.';
                statusMsg.className = 'status error';
                activateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
